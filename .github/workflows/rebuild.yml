name: Weekly Data Refresh

on:
  schedule:
    # 每周一早上 8:17 (北京时间) = 每周日 00:17 UTC
    - cron: '17 0 * * 0'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Fetch latest data from Google Sheets
        run: npm run fetch-data
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      - name: Commit & push if data changed
        run: |
          git config user.name "data-bot"
          git config user.email "bot@pta-research.local"
          git add src/data/*.json
          if git diff --staged --quiet; then
            echo "No data changes, skipping push."
          else
            git commit -m "data: auto-refresh from Google Sheets $(date +%Y-%m-%d)"
            git push
            echo "Data updated and pushed — Vercel will auto-deploy."
          fi
